services:
  tradingagents:
    build: .
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - ./docker-data/.tradingagents:/home/appuser/.tradingagents
    tty: true
    stdin_open: true

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  tradingagents-ollama:
    build: .
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=ollama
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    depends_on:
      - ollama
    tty: true
    stdin_open: true
    profiles:
      - ollama

volumes:
  ollama_data:
